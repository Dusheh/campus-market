  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: campus-backend
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - mysql
  #     - redis
  #   environment:
  #     - GIN_MODE=release
  #   volumes:
  #     - ./backend/config:/app/config

volumes:
  mysql_data:
  redis_data: